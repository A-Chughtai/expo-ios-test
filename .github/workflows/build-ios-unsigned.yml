name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # Updated from 18 to 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      # THIS STEP GENERATES THE /ios FOLDER ON THE GITHUB MAC RUNNER
      - name: Generate iOS Native Files
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build Unsigned App Archive
        run: |
          xcodebuild archive \
            -workspace ios/*.xcworkspace \
            -scheme $(basename ios/*.xcworkspace .xcworkspace) \
            -archivePath build/UnsignedApp.xcarchive \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          cp -r build/UnsignedApp.xcarchive/Products/Applications/*.app build/Payload/
          cd build
          zip -r App.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: build/App.ipa

